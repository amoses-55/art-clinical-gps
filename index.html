<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART Clinical GPS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>ART Clinical GPS</h1>
    <p>Your Guided ART Session Companion</p>
</header>

<main>

    <div class="card">
        <h2>Start Session</h2>
        <button onclick="showMessage('Opening Script')">
            ▶ Start
        </button>
    </div>

    <div class="card">
        <h2>Training</h2>
        <button onclick="showMessage('Training Mode Coming Soon')">
            Open
        </button>
    </div>

    <div class="card">
        <h2>Script Library</h2>
        <button onclick="showMessage('Script Library Coming Soon')">
            Open
        </button>
    </div>

    <div class="card">
        <h2>Troubleshooting</h2>
        <button onclick="showMessage('Troubleshooting Coming Soon')">
            Open
        </button>
    </div>

</main>

<div id="message"></div>

<script src="app.js?v=2"></script>

</body>
</html>
